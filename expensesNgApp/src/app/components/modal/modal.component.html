<div *ngIf="isOpen" class="modal-backdrop" (click)="onBackdropClick()">
  <div class="modal-container" [style.maxWidth]="maxWidth" (click)="$event.stopPropagation()">
    <div class="modal-header" *ngIf="title">
      <h2 class="modal-title">{{ title }}</h2>
      <button class="close-btn" (click)="closed.emit()">
        <i class="fa-solid fa-times"></i>
      </button>
    </div>
    <div class="modal-body"><ng-content></ng-content></div>
    <div class="modal-footer"><ng-content select="[modal-footer]"></ng-content></div>
  </div>
</div>
