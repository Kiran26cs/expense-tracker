<aside class="sidebar" [class.collapsed]="isCollapsed && !isMobile">
  <!-- Desktop header -->
  <a routerLink="/app" class="sidebar-header" *ngIf="!isMobile">
    <div class="sidebar-logo">N</div>
    <div class="sidebar-brand" *ngIf="!isCollapsed">
      <span class="sidebar-title">NidhiWise</span>
      <span class="sidebar-subtitle">Smart finance management</span>
    </div>
  </a>

  <!-- Nav items -->
  <nav class="sidebar-nav">
    <a
      *ngFor="let item of navItems()"
      [routerLink]="'/' + bookId + '/' + item.path"
      class="nav-item"
      [class.active]="isActive(item.path)"
    >
      <span class="nav-icon" [attr.aria-label]="item.label"><i [class]="item.icon"></i></span>
      <span class="nav-label" *ngIf="!isCollapsed || isMobile">{{ item.label }}</span>
    </a>
  </nav>

  <!-- Upgrade CTA (desktop only, hidden for Pro) -->
  <div class="sidebar-upgrade-wrap" *ngIf="!isMobile && userPlan !== 'Pro'">
    <ng-container *ngIf="!isCollapsed; else upgradeIconOnly">
      <div class="upgrade-nudge">
        <div class="upgrade-nudge-badge">
          <i class="fa-solid fa-crown"></i>
          {{ userPlan === 'Free' ? 'Free Plan' : 'Starter Plan' }}
        </div>
        <p class="upgrade-nudge-text">
          {{ userPlan === 'Free' ? 'Unlock unlimited books, more AI credits & team features.' : 'Get unlimited expenses, categories & 300 AI credits/month.' }}
        </p>
        <button class="upgrade-nudge-btn" (click)="openUpgrade()">
          <i class="fa-solid fa-arrow-trend-up"></i>
          {{ userPlan === 'Free' ? 'Upgrade Plan' : 'Upgrade to Pro' }}
        </button>
      </div>
    </ng-container>
    <ng-template #upgradeIconOnly>
      <button class="upgrade-icon-btn" (click)="openUpgrade()" title="Upgrade Plan">
        <i class="fa-solid fa-arrow-trend-up"></i>
      </button>
    </ng-template>
  </div>

  <!-- Collapse button (desktop only) -->
  <div class="sidebar-footer" *ngIf="!isMobile">
    <button class="collapse-btn" (click)="toggleCollapse()" [attr.aria-label]="isCollapsed ? 'Expand sidebar' : 'Collapse sidebar'">
      <i [class]="isCollapsed ? 'fa-solid fa-chevron-right' : 'fa-solid fa-chevron-left'"></i>
    </button>
  </div>
</aside>
