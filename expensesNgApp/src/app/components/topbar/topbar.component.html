<header class="topbar" [class.sidebar-collapsed]="isSidebarCollapsed && !isMobile" [class.no-sidebar]="noSidebar">
  <div class="topbar-left">
    <a *ngIf="!bookName" routerLink="/app" class="app-name-link">
      <div class="topbar-logo">N</div>
      <div class="topbar-brand">
        <h2 class="app-name">NidhiWise</h2>
        <span class="app-subtitle">Smart finance management</span>
      </div>
    </a>
    <a *ngIf="bookName" routerLink="/app" class="icon-btn mobile-home-btn" title="My Books">
      <i class="fa-solid fa-house"></i>
    </a>
    <ng-container *ngIf="bookName">
      <ng-container *ngIf="isEditingName; else displayBookName">
        <input
          #nameInput
          class="topbar-name-input"
          [(ngModel)]="editName"
          (keydown)="onNameKeydown($event)"
          (blur)="saveEditName()"
        />
      </ng-container>
      <ng-template #displayBookName>
        <button class="app-name-btn" (click)="startEditName()">
          <h2 class="app-name" [appTruncate]="currentBook.book()?.name || bookName"></h2>
          <i class="fa-solid fa-pen app-name-edit-icon"></i>
        </button>
      </ng-template>
    </ng-container>
  </div>


  <div class="topbar-right">
    @if (currentBook.book()?.aiChatEnabled) {
      <button class="icon-btn ai-chat-btn" (click)="toggleAiChat()" [title]="'AI Assistant'" [class.ai-chat-active]="chatService.isOpen()">
        <i class="fa-solid fa-wand-magic-sparkles"></i>
      </button>
    }

    <button *ngIf="currentBook.book()" class="icon-btn import-btn" (click)="openImportDrawer()" title="Import activity">
      <i class="fa-solid fa-file-import"></i>
      <span class="import-badge" *ngIf="importService.activeCount() > 0">
        {{ importService.activeCount() }}
      </span>
    </button>

    <a class="topbar-text-link" [href]="landingUrl + '#pricing'" target="_blank" rel="noopener">Pricing</a>

    <a class="icon-btn globe-link" [href]="landingUrl" target="_blank" rel="noopener" title="Visit nidhiwise.com">
      <i class="fa-solid fa-globe"></i>
    </a>

    <button class="icon-btn" (click)="themeService.toggle()" [title]="themeService.theme() === 'light' ? 'Dark mode' : 'Light mode'">
      <i [class]="themeService.theme() === 'light' ? 'fa-solid fa-moon' : 'fa-solid fa-sun'" [style.color]="themeService.theme() !== 'light' ? '#f59e0b' : ''"></i>
    </button>

    <div class="topbar-plan-pill"
         [class.plan-free]="userPlan === 'Free'"
         [class.plan-starter]="userPlan === 'Starter'"
         [class.plan-pro]="userPlan === 'Pro'">
      <i class="fa-solid"
         [class.fa-seedling]="userPlan === 'Free'"
         [class.fa-bolt]="userPlan === 'Starter'"
         [class.fa-crown]="userPlan === 'Pro'"></i>
      {{ userPlan }}
    </div>

    <div class="user-menu-wrapper" #menuWrapper>
      <button class="avatar-btn" (click)="toggleMenu()">
        <div class="avatar">{{ getUserInitials() }}</div>
      </button>
      <div class="dropdown-menu" *ngIf="isMenuOpen">
        <div class="dropdown-user-info">
          <div class="dropdown-name">{{ authState.user()?.name }}</div>
          <div class="dropdown-email">{{ authState.user()?.email || authState.user()?.phone }}</div>
          <div class="dropdown-plan-pill"
               [class.plan-free]="userPlan === 'Free'"
               [class.plan-starter]="userPlan === 'Starter'"
               [class.plan-pro]="userPlan === 'Pro'">
            <i class="fa-solid" [class.fa-seedling]="userPlan === 'Free'" [class.fa-bolt]="userPlan === 'Starter'" [class.fa-crown]="userPlan === 'Pro'"></i>
            {{ userPlan }} Plan
          </div>
        </div>
        <div class="dropdown-divider"></div>
        <a class="dropdown-item" routerLink="/account" (click)="isMenuOpen = false">
          <i class="fa-solid fa-gear"></i> Account Settings
        </a>
        @if (userPlan === 'Free') {
          <button class="dropdown-item upgrade-item" (click)="upgradeModal.open('Starter'); isMenuOpen = false">
            <i class="fa-solid fa-arrow-trend-up"></i> Upgrade Plan
          </button>
        }
        <div class="dropdown-divider"></div>
        <button class="dropdown-item logout-item" (click)="authState.logout()">
          <i class="fa-solid fa-sign-out-alt"></i> Sign Out
        </button>
      </div>
    </div>
  </div>
</header>
