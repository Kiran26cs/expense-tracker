<header class="topbar" [class.sidebar-collapsed]="isSidebarCollapsed && !isMobile">
  <div class="topbar-left">
    <a *ngIf="!bookName" routerLink="/" class="app-name-link">
      <h2 class="app-name">ExpenseTracker</h2>
    </a>
    <ng-container *ngIf="bookName">
      <ng-container *ngIf="isEditingName; else displayBookName">
        <input
          #nameInput
          class="topbar-name-input"
          [(ngModel)]="editName"
          (keydown)="onNameKeydown($event)"
          (blur)="saveEditName()"
        />
      </ng-container>
      <ng-template #displayBookName>
        <button class="app-name-btn" (click)="startEditName()">
          <h2 class="app-name" [appTruncate]="currentBook.book()?.name || bookName"></h2>
          <i class="fa-solid fa-pen app-name-edit-icon"></i>
        </button>
      </ng-template>
    </ng-container>
  </div>


  <div class="topbar-right">
    <button class="icon-btn import-btn" (click)="openImportDrawer()" title="Import activity">
      <i class="fa-solid fa-file-import"></i>
      <span class="import-badge" *ngIf="importService.activeCount() > 0">
        {{ importService.activeCount() }}
      </span>
    </button>

    <button class="icon-btn" (click)="themeService.toggle()" [title]="themeService.theme() === 'light' ? 'Dark mode' : 'Light mode'">
      <i [class]="themeService.theme() === 'light' ? 'fa-solid fa-moon' : 'fa-solid fa-sun'" [style.color]="themeService.theme() !== 'light' ? '#f59e0b' : ''"></i>
    </button>

    <div class="user-menu-wrapper" #menuWrapper>
      <button class="avatar-btn" (click)="toggleMenu()">
        <div class="avatar">{{ getUserInitials() }}</div>
      </button>
      <div class="dropdown-menu" *ngIf="isMenuOpen">
        <div class="dropdown-user-info">
          <div class="dropdown-name">{{ authState.user()?.name }}</div>
          <div class="dropdown-email">{{ authState.user()?.email || authState.user()?.phone }}</div>
        </div>
        <div class="dropdown-divider"></div>
        <button class="dropdown-item logout-item" (click)="authState.logout()">
          <i class="fa-solid fa-sign-out-alt"></i> Sign Out
        </button>
      </div>
    </div>
  </div>
</header>
