<div class="drp-wrapper">
  <button type="button" class="drp-trigger" (click)="toggle()">
    📅 {{ displayLabel }}
  </button>
  <div class="drp-backdrop" *ngIf="open" (click)="open = false"></div>
  <div class="drp-container" *ngIf="open" [ngStyle]="popoverStyle" (click)="$event.stopPropagation()">
    <h4 class="drp-title">Select Date Range</h4>
    <div class="drp-fields">
      <div class="drp-field">
        <label>Start Date</label>
        <input type="date" [(ngModel)]="localStart" class="drp-input" />
      </div>
      <div class="drp-field">
        <label>End Date</label>
        <input type="date" [(ngModel)]="localEnd" class="drp-input" />
      </div>
    </div>
    <div class="drp-actions">
      <button class="drp-btn-clear" (click)="clear()">Clear</button>
      <button class="drp-btn-apply" (click)="apply()">Apply</button>
    </div>
  </div>
</div>
