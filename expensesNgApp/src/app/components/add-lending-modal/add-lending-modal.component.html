<app-modal [isOpen]="isOpen" title="New Lending" (closed)="onClose()">
  <div class="lending-form">
    <div class="form-error" *ngIf="error()">{{ error() }}</div>

    <div class="form-row">
      <div class="form-field form-field--full">
        <label class="form-label">Borrower Name <span class="req">*</span></label>
        <input type="text" class="form-input" [(ngModel)]="borrowerName" placeholder="e.g. Rahul Sharma" />
      </div>
    </div>

    <div class="form-row">
      <div class="form-field">
        <label class="form-label">Contact (optional)</label>
        <input type="text" class="form-input" [(ngModel)]="borrowerContact" placeholder="Phone or email" />
      </div>
      <div class="form-field">
        <label class="form-label">Principal Amount <span class="req">*</span></label>
        <input type="number" class="form-input" [(ngModel)]="principalAmount" placeholder="0.00" min="0.01" step="0.01" />
      </div>
    </div>

    <div class="form-row">
      <div class="form-field">
        <label class="form-label">Interest Rate (% p.a.)</label>
        <input type="number" class="form-input" [(ngModel)]="annualInterestRate" placeholder="0" min="0" step="0.1" />
        <span class="form-hint">Leave 0 for interest-free</span>
      </div>
      <div class="form-field">
        <label class="form-label">Start Date <span class="req">*</span></label>
        <input type="date" class="form-input" [(ngModel)]="startDate" />
      </div>
    </div>

    <div class="form-row">
      <div class="form-field">
        <label class="form-label">Due Date (optional)</label>
        <input type="date" class="form-input" [(ngModel)]="dueDate" />
      </div>
      <div class="form-field">
        <label class="form-label">Notes (optional)</label>
        <input type="text" class="form-input" [(ngModel)]="notes" placeholder="Any remarks" />
      </div>
    </div>
  </div>

  <div modal-footer>
    <button class="btn-ghost" (click)="onClose()">Cancel</button>
    <button class="btn-primary" [disabled]="loading()" (click)="submit()">
      <i class="fa-solid fa-spinner fa-spin" *ngIf="loading()"></i>
      <span *ngIf="!loading()">Save Lending</span>
    </button>
  </div>
</app-modal>
